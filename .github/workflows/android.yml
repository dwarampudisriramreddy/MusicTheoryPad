name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install JUCE Host Dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libx11-dev libfreetype6-dev libfreetype-dev libfontconfig1-dev libxext-dev libxinerama-dev libxcursor-dev libxrandr-dev libasound2-dev libcurl4-openssl-dev pkg-config
        sudo ln -s /usr/include/freetype2/freetype /usr/include/freetype || true
        sudo ln -s /usr/include/freetype2/ft2build.h /usr/include/ft2build.h || true

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest

    - name: Generate Android Debug Keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v \
          -keystore ~/.android/debug.keystore \
          -storepass android \
          -alias androiddebugkey \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Configure CMake for Android
      run: |
        cmake -B build-android \
          -G Ninja \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_LATEST_HOME \
          -DANDROID_NDK=$ANDROID_NDK_LATEST_HOME \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DCMAKE_ANDROID_STL_TYPE=c++_static \
          -DCMAKE_SYSTEM_VERSION=29 \
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
          -S .

    - name: Build Native Libraries
      run: cmake --build build-android --config Release

    - name: Build APK via Gradle
      run: |
        GRADLE_DIR=$(find build-android -name gradlew | grep -v "_deps" | head -n 1 | xargs dirname)
        cd "$GRADLE_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MusicTheoryPad-Android
        path: build-android/**/*.apk