name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest

    - name: Configure CMake for Android
      run: |
        cmake -B build-android \
          -G Ninja \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_LATEST_HOME \
          -DCMAKE_ANDROID_STL_TYPE=c++_static \
          -DCMAKE_SYSTEM_VERSION=29 \
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
          -S .

    - name: Build
      run: cmake --build build-android --config Release

    # When compiling JUCE for Android via CMake, it typically generates
    # the APK in the build directory under the intermediate java/gradle folders.
    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MusicTheoryPad-Android
        path: build-android/**/*.apk
